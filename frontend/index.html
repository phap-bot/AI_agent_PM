    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scrum Master Agent</title>

                extend: {
                    "colors": {

                        "surface-container-high": "#e7e7f3",
                        "on-surface": "#191b23",
                        "tertiary": "#943700",
                        "tertiary-container": "#bc4800",
                        "surface-bright": "#faf8ff",
                        "tertiary-fixed": "#ffdbcd",
                        "on-primary-fixed": "#00174b",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#fffbff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "primary": "#004ac6",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#d9d9e5",
                        "surface-container-highest": "#e1e2ed",
                        "secondary-fixed": "#e2dfff",
                        "inverse-on-surface": "#f0f0fb",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-primary-container": "#eeefff",
                        "on-surface-variant": "#434655",
                        "on-secondary-fixed-variant": "#3323cc",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ededf9",
                        "on-secondary-fixed": "#0f0069",
                        "primary-container": "#2563eb",
                        "surface-tint": "#0053db",
                        "secondary": "#4b41e1",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3fe",
                        "outline": "#737686",
                        "on-background": "#191b23",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#360f00",
                        "surface-variant": "#e1e2ed",
                        "secondary-container": "#645efb",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7",
                        "surface": "#faf8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-page": "32px",
                        "stack-lg": "24px",
                        "gutter": "16px",
                        "unit": "4px",
                        "container-padding": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "mono-sm": ["JetBrains Mono"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "mono-sm": ["12px", {"lineHeight": "18px", "fontWeight": "450"}],

                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { background-color: #F9FAFB; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.4); border-color: rgba(34, 197, 94, 0.6); }
            50% { box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); border-color: rgba(34, 197, 94, 1); }
        }
        .ai-badge-pulse {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-bg {
            background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.3) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
  </head>
  <body class="font-body-md text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
