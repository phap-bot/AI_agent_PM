version: '3.8'

services:
  backend:
    build: .
    container_name: ai_scrum_master_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_REASONING_MODEL=deepseek-r1:7b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./src/ai_scrum_master/data/chromadb:/app/src/ai_scrum_master/data/chromadb
      - ./src/ai_scrum_master/data/raw_docs:/app/src/ai_scrum_master/data/raw_docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: ai_scrum_master_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: >
      bash -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
